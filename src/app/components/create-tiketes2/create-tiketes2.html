<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title>Formulario tiketes</mat-card-title>
      <button
   mat-icon-button
   (click)="closeModal()"
  >
    <mat-icon>close</mat-icon>
  </button>
  </mat-card-header>

  <mat-card-content>
   <form
    [formGroup]="TiketeForm"
    (ngSubmit)="guardarTikete()"
    class="ticket-form"
   >
   <!--   <div class="form-grid">-->
      <mat-grid-list cols="2" rowHeight="100px" gutterSize="16px">
      <mat-grid-tile>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Numero</mat-label>
        <input
         matInput
         type="number"
         inputmode="numeric"
         formControlName="Number"
        />
       </mat-form-field>
</mat-grid-tile>
    <mat-grid-tile>
       <mat-form-field appearance="outline" class="full-width">
        <mat-label>Assigned Box</mat-label>
        <input
         matInput
         formControlName="AssignedBox"
        />
       </mat-form-field>
</mat-grid-tile>

 <mat-grid-tile>
       <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombre cliente</mat-label>
        <input
         matInput
         formControlName="Nombre"
        />
       </mat-form-field>
</mat-grid-tile>

<mat-grid-tile>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Fecha creacion</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="CreatedAt">
        <mat-hint>DD/MM/YYYY</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
       </mat-form-field>
</mat-grid-tile>

<mat-grid-tile>
       <mat-form-field appearance="outline" class="full-width">
        <mat-label>Status</mat-label>
        <mat-select formControlName="Status">
          <mat-option *ngFor="let item of itemsStatus" [value]="item.code">
            {{ item.name }}
          </mat-option>
        </mat-select>
       </mat-form-field>
</mat-grid-tile>

<mat-grid-tile>
       <div class="button-container">
         <button mat-raised-button color="primary" type="submit" [disabled]="TiketeForm.invalid || isSubmitting">
          Guardar Tikete
         </button>
       </div>
</mat-grid-tile>
    <!-- </div> -->
    </mat-grid-list>
 </form>
  </mat-card-content>



</mat-card>
